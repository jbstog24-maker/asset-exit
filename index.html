<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Exit Network | Sell Surplus Equipment</title>
  <meta name="description" content="Submit trucks, trailers, tractors, fleet vehicles, farm equipment, and contractor equipment for resale, consignment, or auction review." />

  <style>
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --green: #16a34a;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1360px, 92%);
      margin: 0 auto;
    }

    header {
      background: rgba(15, 23, 42, 0.96);
      color: var(--white);
      padding: 14px 0;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 1.2rem;
      line-height: 1;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #111827;
      font-weight: 900;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #ffffff;
    }

    .nav-cta {
      background: var(--accent);
      color: #111827;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      white-space: nowrap;
      line-height: 1.2;
    }

    .nav-cta:hover {
      background: #fbbf24;
      transform: translateY(-1px);
    }

    .hero {
      background:
        linear-gradient(
          90deg,
          rgba(15, 23, 42, 1) 0%,
          rgba(15, 23, 42, 0.98) 28%,
          rgba(15, 23, 42, 0.82) 46%,
          rgba(15, 23, 42, 0.46) 68%,
          rgba(15, 23, 42, 0.26) 100%
        ),
        url("hero-bg.png");
      background-size: cover;
      background-position: 76% center;
      background-repeat: no-repeat;
      color: var(--white);
      padding: 74px 0 96px;
      position: relative;
      overflow: hidden;
      min-height: 660px;
      display: flex;
      align-items: center;
    }

    .hero::after {
      display: none;
    }

    .hero-grid {
      width: 100%;
      max-width: 650px;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .badge span {
      width: 9px;
      height: 9px;
      background: var(--green);
      border-radius: 999px;
      display: inline-block;
    }

    h1 {
      font-size: clamp(2.75rem, 4.6vw, 4.85rem);
      line-height: 0.96;
      letter-spacing: -0.075em;
      margin-bottom: 24px;
      max-width: 650px;
    }

    .hero p {
      color: #d8e0ec;
      font-size: 1.12rem;
      max-width: 600px;
      margin-bottom: 28px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border: 0;
      border-radius: 12px;
      padding: 15px 20px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #111827;
    }

    .btn-primary:hover {
      background: #fbbf24;
      transform: translateY(-1px);
    }

    .btn-secondary {
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: var(--white);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .hero-card {
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
    }

    .hero-card h3 {
      font-size: 1.2rem;
      margin-bottom: 14px;
    }

    .mini-list {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .mini-list li {
      display: flex;
      gap: 10px;
      color: #334155;
    }

    .mini-list li::before {
      content: "✓";
      color: var(--green);
      font-weight: 900;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #f8fafc;
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      color: var(--bg);
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    section {
      padding: 74px 0;
    }

    .section-title {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 42px;
    }

    .section-title h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.055em;
      margin-bottom: 14px;
    }

    .section-title p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .asset-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
    }

    .asset-card .icon {
      width: 42px;
      height: 42px;
      background: #fff7ed;
      color: var(--accent-dark);
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      margin-bottom: 12px;
    }

    .asset-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .asset-card p {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .steps {
      background: var(--white);
    }

    .step-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .step {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      background: #f8fafc;
    }

    .step-number {
      width: 34px;
      height: 34px;
      background: var(--bg);
      color: var(--white);
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .lead-form-wrap {
      display: grid;
      grid-template-columns: 0.7fr 1.3fr;
      gap: 30px;
      align-items: start;
    }

    .form-info {
      background: var(--bg);
      color: var(--white);
      border-radius: var(--radius);
      padding: 30px;
      position: sticky;
      top: 20px;
    }

    .form-info h2 {
      font-size: 2rem;
      line-height: 1.05;
      letter-spacing: -0.05em;
      margin-bottom: 14px;
    }

    .form-info p {
      color: #cbd5e1;
      margin-bottom: 18px;
    }

    .check-list {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .check-list li {
      display: flex;
      gap: 10px;
      color: #e2e8f0;
    }

    .check-list li::before {
      content: "✓";
      color: var(--accent);
      font-weight: 900;
    }

    /* --- CLEAN DYNAMIC IFRAME LAYOUT WITHOUT HEIGHT LOCKS --- */
    .iframe-container {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    /* Target standard Jotform generated scripts to eliminate structural padding blockades */
    .jotform-embed,
    .form-all {
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
    }

    .hero-proof {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 620px;
      margin-top: 26px;
    }

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;

      backdrop-filter: blur(8px);
