<script>
    window.addEventListener('message', function(event) {
      // Catch Jotform's native success event when a user submits the form
      if (event.data && typeof event.data === 'string' && (event.data.includes('WebFormSubmit') || event.data.includes('sentSubmit'))) {
        
        console.log("Jotform submission detected. Dispatching notification to Formspree...");

        // Silently send an email alert to your inbox via your Formspree endpoint
        fetch("https://formspree.io/f/xwvdjowv", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            subject: "New Asset Exit Network Lead - Application Submitted",
            message: "Notification: A user has completed the AEC Equipment Seller Application on your website.",
            recipient: "jbstog24@gmail.com",
            timestamp: new Date().toLocaleString()
          })
        })
        .then(function(response) {
          if (response.ok) {
            console.log("Notification email successfully triggered.");
          }
        })
        .catch(function(error) {
          console.error("Notification dispatch error:", error);
        });
      }
    }, false);
  </script>
</body>
</html>
